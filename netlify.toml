# Nuvora Agency — Netlify Configuration
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  # No build command needed — pure static site
  publish = "."

[build.environment]
  NODE_VERSION = "18"

# ─── Headers ─────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Security headers
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: https:; connect-src 'self'"

# Cache fonts aggressively (they never change)
[[headers]]
  for = "/assets/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache JS aggressively
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache CSS
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Cache favicon
[[headers]]
  for = "/assets/favicon.*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ─── Redirects ────────────────────────────────────────────────
[[redirects]]
  from = "http://nuvora-agency.netlify.app/*"
  to = "https://nuvora-agency.netlify.app/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://www.nuvora.agency/*"
  to = "https://nuvora.agency/:splat"
  status = 301
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ─── Forms ────────────────────────────────────────────────────
[forms]
  enabled = true
