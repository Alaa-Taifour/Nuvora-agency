<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>404 — Page Not Found | Nuvora</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg"/>
<link rel="stylesheet" href="assets/fonts/fonts.css"/>
<!-- Vercel Speed Insights -->
<script>
  window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
</script>
<script defer src="/_vercel/speed-insights/script.js"></script>
<style>
:root {
  --navy:#0D1B2A;--violet:#7B2FBE;--cyan:#00D4FF;--white:#F4F6F9;--gray:#9aa3b2;
  --font-display:'Syne','Segoe UI',sans-serif;
  --font-mono:'JetBrains Mono','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:var(--navy);color:var(--white);
  font-family:var(--font-display);
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:2rem;
  text-align:center;padding:2rem;
  overflow:hidden;
}
.orb{
  position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(123,47,190,0.12),transparent 70%);
  top:-100px;right:-100px;
}
.error-num{
  font-size:clamp(6rem,20vw,14rem);
  font-weight:800;letter-spacing:-0.05em;line-height:1;
  background:linear-gradient(135deg,var(--violet),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.error-tag{
  font-family:var(--font-mono);
  font-size:0.75rem;letter-spacing:0.3em;
  color:var(--cyan);margin-bottom:0.5rem;
}
.error-title{
  font-size:clamp(1.5rem,4vw,2.5rem);
  font-weight:800;margin-bottom:1rem;
}
.error-sub{
  color:var(--gray);font-size:1rem;
  max-width:400px;line-height:1.7;
  margin-bottom:2rem;
}
.back-btn{
  display:inline-flex;align-items:center;gap:0.6rem;
  padding:1rem 2.4rem;
  background:linear-gradient(135deg,var(--violet),var(--violet));
  color:var(--white);text-decoration:none;
  font-family:var(--font-display);font-weight:700;
  font-size:0.82rem;letter-spacing:0.1em;text-transform:uppercase;
  border-radius:3px;
  box-shadow:0 0 40px rgba(123,47,190,0.4);
  transition:all 0.3s;
}
.back-btn:hover{transform:translateY(-3px);box-shadow:0 15px 50px rgba(123,47,190,0.5);}
.logo-mark{
  position:fixed;top:2rem;left:50%;transform:translateX(-50%);
  font-size:1.2rem;font-weight:800;letter-spacing:0.2em;
  background:linear-gradient(135deg,var(--white),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
</style>
</head>
<body>
<div class="orb"></div>
<div class="logo-mark">NUVORA</div>
<div class="error-tag">// error 404</div>
<div class="error-num">404</div>
<h1 class="error-title">Page Not Found</h1>
<p class="error-sub">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
<a href="/" class="back-btn">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
  Back to Home
</a>
</body>
</html>
